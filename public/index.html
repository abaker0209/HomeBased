<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>HomeBased</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />

    <!-- Bootstrap CSS -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />

    <!-- Style Sheet -->
    <link rel="stylesheet" href="style.css" />
  </head>

  <body>
    <div id="content" class="container-fluid">
      <!-- Header Bar -->
      <div class="row">
        <nav class="navbar navbar-light bg-light shadow-sm">
          <div class="container-fluid">
            <!--  Toggler Button -->
            <button
              class="navbar-toggler"
              id="toggleSidebar"
              type="button"
              data-bs-toggle="collapse"
              data-bs-target="#sidebar"
              aria-controls="sidebar"
              aria-expanded="true"
              aria-label="Toggle navigation"
            >
              <span class="navbar-toggler-icon"></span>
            </button>

            <span class="navbar-brand ms-3">HomeBased</span>
          </div>
        </nav>
      </div>

      <!-- Body Content Container -->
      <div class="d-flex">
        <!-- Sidebar -->
        <nav id="sidebar" class="bg-light sidebar collapsed">
          <div class="position-sticky pt-3">
            <ul class="nav flex-column" id="navMenu">
              <li class="nav-item">
                <a class="nav-link active" data-page="home">Home</a>
              </li>
              <li class="nav-item">
                <a class="nav-link" data-page="listed">Listed Items</a>
              </li>
              <li class="nav-item">
                <a class="nav-link" data-page="unlisted">Unlisted Items</a>
              </li>
              <li class="nav-item">
                <a class="nav-link" data-page="add">Add Item</a>
              </li>
              <li class="nav-item">
                <a class="nav-link" data-page="sell">Sell Item</a>
              </li>
            </ul>
          </div>
        </nav>

        <!-- Main Content -->
        <main id="mainContent" class="flex-fill px-4 mt-4">
          <div id="contentArea"></div>
        </main>
      </div>
    </div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

    <!-- External JS -->
    <script src="app.js"></script>
  </body>
</html>
